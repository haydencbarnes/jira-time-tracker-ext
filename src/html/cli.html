<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Jira Time CLI</title>
    <style>
      html {
        height: 100%;
        width: 100%;
      }

      body {
        width: 750px;
        margin: 0 auto;
        min-height: 100vh;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
      }

      html.page-view-layout body {
        width: 100%;
        max-width: 1400px;
        padding: 0 clamp(12px, 4vw, 32px);
      }

      a {
        color: #0052cc;
        text-decoration: none;
      }
      a:hover,
      a:active,
      a:focus {
        text-decoration: underline;
      }

      .container {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 10px;
        padding-bottom: 60px;
      }

      /* Inline banner inside terminal output */
      /* Pinned above scrollable output; sticky so page scroll to bottom does not hide it */
      .cli-terminal-header {
        flex-shrink: 0;
        margin-bottom: 8px;
        position: sticky;
        top: 0;
        z-index: 2;
        background: #f3f3f3;
        padding-bottom: 2px;
      }
      .cli-welcome {
        color: #0052cc;
        border: 1px solid #0052cc;
        border-radius: 6px;
        padding: 6px 8px;
        display: inline-block;
        font-weight: 600;
      }

      #error {
        padding: 10px;
        color: #cc0000;
        background-color: #ffdddd;
        font-weight: bold;
        display: none;
        word-wrap: break-word;
      }
      #success {
        padding: 10px;
        color: #4f8a10;
        background-color: #dff2bf;
        font-weight: bold;
        display: none;
      }

      .terminal {
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          'Liberation Mono', 'Courier New', monospace;
        background: #f3f3f3; /* light mode: use our standard light gray */
        color: #1a1a1a;
        border-radius: 6px;
        border: 1px solid #ddd;
        min-height: 280px;
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 10px;
        box-sizing: border-box;
        position: relative;
      }
      .terminal-output {
        white-space: pre-wrap;
        line-height: 1.4;
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        overflow-anchor: none;
      }
      .terminal-line {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 8px;
      }
      .prompt {
        color: #0052cc;
      }
      .input {
        flex: 1;
        background: transparent;
        color: inherit;
        font: inherit;
        padding: 6px 8px;
        border: 1px solid #0052cc;
        border-radius: 6px;
        outline: none;
      }
      .input:focus {
        border-color: #0052cc;
        box-shadow: 0 0 0 2px rgba(0, 82, 204, 0.18);
      }
      .hint {
        color: #999;
        font-size: 12px;
        margin-top: 6px;
      }
      .cli-bottom-anchor {
        height: 1px;
      }
      .line-success {
        color: #111111;
      }
      .line-info {
        color: #111111;
      }
      .line-user {
        color: #9aa4af;
      }
      .line-error {
        color: #ff6b6b;
      }
      .line-subtle {
        color: #b6bcc4;
      }
      .issue-id {
        color: #0052cc;
        font-weight: 600;
      }

      /* Slash command palette (light: matches terminal) */
      .cmd-palette {
        position: fixed;
        min-width: 320px;
        max-width: calc(100vw - 16px);
        max-height: 220px;
        overflow-y: auto;
        background: #fff;
        color: #1a1a1a;
        border: 1px solid #ddd;
        border-radius: 6px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        padding: 6px;
        display: none;
        z-index: 10001; /* above footer/brand */
        margin: 0 8px; /* viewport padding */
      }
      .cmd-item {
        padding: 8px 10px;
        border-radius: 4px;
        cursor: pointer;
        line-height: 1.2;
      }
      .cmd-item .cmd-label {
        color: #0052cc;
        font-weight: 600;
      }
      .cmd-item .cmd-desc {
        color: #666;
        font-size: 12px;
        display: block;
        margin-top: 2px;
      }
      .cmd-item.active {
        background: rgba(0, 82, 204, 0.1);
      }

      /* Classic orange BETA badge */
      .jira-popup-beta-badge {
        display: inline-block;
        background: #ff6b35;
        color: white;
        font-size: 10px;
        font-weight: 700;
        padding: 2px 6px;
        border-radius: 8px;
        margin-left: 8px;
        vertical-align: middle;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        line-height: 1;
        box-shadow: 0 1px 3px rgba(255, 107, 53, 0.3);
      }

      #brand {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        z-index: 9999;
        height: 50px;
        background: #f3f3f3;
        margin: 0;
        border-top: 1px solid #e5e5e5;
      }
      #info {
        padding: 12px 0 0 10px;
        width: 50%;
        display: inline-block;
        vertical-align: top;
      }
      #nav {
        font-size: 12px;
        color: #cccccc;
        width: 44%;
        display: inline-block;
        text-align: right;
        vertical-align: top;
        padding: 12px 5px 0 0;
      }
      #nav > * {
        display: inline-block;
        vertical-align: middle;
        margin: 0 3px;
      }
      .theme-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 26px;
        height: 24px;
        border-radius: 4px;
        cursor: pointer;
        border: none;
        vertical-align: middle;
        transition: background-color 0.3s;
        margin: 0 2px;
        padding: 0;
        font-size: 16px;
        line-height: 1;
        background: rgba(0, 0, 0, 0.05);
      }
      .theme-button:hover {
        background-color: rgba(0, 0, 0, 0.15);
      }

      /* Ko-fi button */
      .kofi-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 0 8px;
        height: 24px;
        border-radius: 4px;
        background: rgba(0, 0, 0, 0.05);
        color: #0052cc !important;
        font-weight: 400;
        text-decoration: none !important;
        line-height: 1;
        border: 1px solid transparent;
        vertical-align: middle;
      }
      .kofi-btn:hover {
        background-color: rgba(0, 0, 0, 0.12);
      }

      /* Dark mode */
      body.dark-mode {
        background-color: #141414;
        color: #e0e0e0;
      }
      body.dark-mode a {
        color: #4690dd !important;
        font-weight: lighter;
      }
      body.dark-mode .kofi-btn {
        background: rgba(255, 255, 255, 0.1);
        color: #4690dd !important;
      }
      body.dark-mode .kofi-btn:hover {
        background: rgba(255, 255, 255, 0.18);
      }
      body.dark-mode .theme-button {
        background: rgba(255, 255, 255, 0.1);
      }
      body.dark-mode .theme-button:hover {
        background: rgba(255, 255, 255, 0.2);
      }
      body.dark-mode .terminal {
        background: #0b0b0b;
        color: #e6e6e6;
        border-color: #333;
      }
      body.dark-mode .cli-terminal-header {
        background: #0b0b0b;
      }
      body.dark-mode .prompt {
        color: #4690dd;
      }
      body.dark-mode .line-success,
      body.dark-mode .line-info {
        color: #ffffff;
      }
      body.dark-mode .issue-id {
        color: #4690dd;
      }
      body.dark-mode #brand {
        background: #141414;
        border-top: 1px solid #333;
      }
      body.dark-mode .cli-welcome {
        color: #4690dd;
        border-color: #4690dd;
      }
      body.dark-mode .cmd-palette {
        background: #141414;
        color: #e6e6e6;
        border-color: #333;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.55);
      }
      body.dark-mode .cmd-item .cmd-label {
        color: #7eb8ff;
      }
      body.dark-mode .cmd-item .cmd-desc {
        color: #9aa4af;
      }
      body.dark-mode .cmd-item.active {
        background: rgba(70, 144, 221, 0.18);
      }
      body.dark-mode .input {
        border-color: #4690dd;
      }
      body.dark-mode .input:focus {
        border-color: #4690dd;
        box-shadow: 0 0 0 2px rgba(70, 144, 221, 0.25);
      }
    </style>
  </head>
  <body>
    <div id="error"></div>
    <div id="success"></div>
    <div class="container">
      <div class="terminal" role="group" aria-label="Jira time entry terminal">
        <div class="cli-terminal-header">
          <span class="cli-welcome"
            >Welcome to Jira Time Log CLI
            <span class="jira-popup-beta-badge">BETA</span></span
          >
        </div>
        <div id="cli-output" class="terminal-output" aria-live="polite"></div>
        <div class="terminal-line">
          <span class="prompt">➜</span>
          <input
            id="cli-input"
            class="input"
            type="text"
            placeholder="e.g., PROJ-123 1h 30m yesterday Fix tests"
            autocomplete="off"
            spellcheck="false"
            aria-label="Command"
          />
        </div>
        <div class="hint">
          Enter to submit • ↑/↓ history • / for commands • clear • help or ?
        </div>
        <div
          id="cli-bottom-anchor"
          class="cli-bottom-anchor"
          aria-hidden="true"
        ></div>
        <div
          id="cmd-palette"
          class="cmd-palette"
          role="listbox"
          aria-label="Slash commands"
        ></div>
      </div>
    </div>

    <div id="brand">
      <div id="info">
        <div style="text-align: left; padding-left: 4px">
          <a
            class="kofi-btn"
            href="https://ko-fi.com/haydenbarnesos"
            target="_blank"
            tabindex="1"
            title="Buy me a coffee"
            ><span class="kofi-cup" aria-hidden="true">☕</span
            ><span class="kofi-text"> Buy me a coffee</span></a
          >
        </div>
      </div>
      <div id="nav">
        <a
          href="popup.html?source=navigation"
          tabindex="1"
          style="color: #0052cc"
          ><img
            src="src/icons/cells.png"
            alt="Time Table"
            style="vertical-align: middle; width: 20px; height: 20px"
        /></a>
        |
        <a href="search.html" tabindex="1" style="color: #0052cc"
          ><img
            src="src/icons/magnifying-glass.png"
            alt="Search"
            style="vertical-align: middle; width: 19px; height: 19px"
        /></a>
        |
        <a
          href="timerFeatureModule/timer.html"
          tabindex="1"
          style="color: #0052cc"
          ><img
            src="src/icons/timer.png"
            alt="Timer"
            style="vertical-align: middle; width: 20px; height: 20px"
        /></a>
        |
        <a href="options.html" tabindex="1" style="color: #0052cc"
          ><img
            src="src/icons/settings.png"
            alt="Settings"
            style="vertical-align: middle; width: 20px; height: 20px"
        /></a>
        |
        <button id="themeToggle" class="theme-button" title="Toggle dark mode">
          <span class="icon">🌙</span>
        </button>
        |
        <a
          href="https://github.com/haydencbarnes/jira-time-tracker-ext"
          target="_blank"
          tabindex="1"
          style="color: #0052cc"
          >Learn More</a
        >
      </div>
    </div>

    <script src="dist/cli.js"></script>
  </body>
</html>
